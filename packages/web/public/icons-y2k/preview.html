<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Y2K icon set preview</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f6f6f7; margin: 0; padding: 32px; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p { color: #666; font-size: 13px; margin: 0 0 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; max-width: 900px; }
  .card { background: #fff; border-radius: 16px; padding: 16px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card img { width: 64px; height: 64px; object-fit: contain; display: block; margin: 0 auto; }
  .pair { display: flex; justify-content: center; gap: 12px; align-items: center; }
  .label { font-size: 12px; font-weight: 600; margin-top: 10px; color: #111; }
  .sub { font-size: 10px; color: #999; display: flex; justify-content: center; gap: 30px; margin-top: 4px; }
</style>
</head>
<body>
<h1>Goals icons — current vs Y2K 3D set</h1>
<p>New set lives in <code>public/icons-y2k/</code> — originals untouched.</p>
<div class="grid" id="grid"></div>
<script>
  const icons = [
    ["get-fit", "Get Fit"],
    ["sleep-better", "Sleep Better"],
    ["stop-procrastinating", "Stop Procrastinating"],
    ["stop-doomscrolling", "Stop Doomscrolling"],
    ["social-skills", "Improve Social Skills"],
    ["manage-stress", "Manage Stress"],
    ["read-more", "Read More"],
    ["be-productive", "Be More Productive"],
  ];
  document.getElementById("grid").innerHTML = icons.map(([k, label]) => `
    <div class="card">
      <div class="pair">
        <img src="/icons/${k}.webp" alt="" />
        <img src="/icons-y2k/${k}.png" alt="" />
        <img src="/icons-macos9/${k}.png" alt="" />
      </div>
      <div class="label">${label}</div>
      <div class="sub"><span>current</span><span>y2k</span><span>macos9</span></div>
    </div>`).join("");
</script>
</body>
</html>
