services:
  postgres:
    image: postgres:16-alpine
    container_name: sidekick-pg
    restart: always
    environment:
      POSTGRES_USER: sidekick
      POSTGRES_PASSWORD: sidekick
      POSTGRES_DB: sidekick
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-55432}:5432"

volumes:
  pg_data:
