<!doctype html>
<html><head><meta charset="utf-8"><title>Sidekick — Buttons</title><style>
@font-face { font-family: "ABC Diatype Rounded"; src: url("../assets/ABCDiatypeRounded.ttf") format("truetype"); font-weight: 100 900; font-display: swap; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "ABC Diatype Rounded", ui-rounded, system-ui, sans-serif; background: #fff; color: #111; padding: 24px; }
h1 { font-size: 13px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; color: rgba(17,17,17,.45); margin-bottom: 16px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.note { font-size: 12px; color: rgba(17,17,17,.45); margin-top: 14px; line-height: 1.5; }
code { font-family: ui-monospace, monospace; font-size: 11px; }
</style></head><body>
<h1>Primary pill — solid-shadow, pressed-in active state</h1>
<div style="max-width:340px;display:flex;flex-direction:column;gap:12px">
  <button style="width:100%;padding:16px 0;border-radius:999px;background:#111;color:#fff;font:600 16px 'ABC Diatype Rounded',ui-rounded,system-ui;border:2px solid #111;box-shadow:2px 2px 0 0 #111;cursor:pointer">Continue</button>
  <button disabled style="width:100%;padding:16px 0;border-radius:999px;background:#111;color:#fff;font:600 16px 'ABC Diatype Rounded',ui-rounded,system-ui;border:2px solid #111;box-shadow:2px 2px 0 0 #111;opacity:.4">Continue</button>
</div>
<p class="note">Active state: translate(2px, 2px) + shadow removed — the button physically presses into its own shadow. Disabled: 40% opacity, no press.</p>
<h1 style="margin-top:24px">Send button</h1>
<button style="width:44px;height:44px;border-radius:999px;background:#F2C94C;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>
<p class="note">44px circle, Sun Yellow, white up-arrow. Sits beside the message field.</p></body></html>
