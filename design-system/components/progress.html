<!doctype html>
<html><head><meta charset="utf-8"><title>Sidekick — Progress</title><style>
@font-face { font-family: "ABC Diatype Rounded"; src: url("../assets/ABCDiatypeRounded.ttf") format("truetype"); font-weight: 100 900; font-display: swap; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "ABC Diatype Rounded", ui-rounded, system-ui, sans-serif; background: #fff; color: #111; padding: 24px; }
h1 { font-size: 13px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; color: rgba(17,17,17,.45); margin-bottom: 16px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.note { font-size: 12px; color: rgba(17,17,17,.45); margin-top: 14px; line-height: 1.5; }
code { font-family: ui-monospace, monospace; font-size: 11px; }
</style></head><body>
<h1>Funnel progress — 3 segments</h1>
<div style="max-width:360px;display:flex;flex-direction:column;gap:20px">
  <div style="display:flex;gap:6px"><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:15%;background:#9DC4F2;border-radius:999px"></div></div><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:0%;background:#9DC4F2;border-radius:999px"></div></div><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:0%;background:#9DC4F2;border-radius:999px"></div></div></div>
  <div style="display:flex;gap:6px"><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:100%;background:#9DC4F2;border-radius:999px"></div></div><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:60%;background:#9DC4F2;border-radius:999px"></div></div><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:0%;background:#9DC4F2;border-radius:999px"></div></div></div>
  <div style="display:flex;gap:6px"><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:100%;background:#9DC4F2;border-radius:999px"></div></div><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:100%;background:#9DC4F2;border-radius:999px"></div></div><div style="flex:1;height:8px;background:#F0F0F2;border-radius:999px;overflow:hidden"><div style="height:100%;width:100%;background:#9DC4F2;border-radius:999px"></div></div></div>
</div>
<p class="note">Track Field Gray, fill Sky, 8px tall, fully rounded. First segment is seeded to 15% at step 0 so the path never reads as "no progress". Fill animates 500ms ease-out.</p></body></html>
